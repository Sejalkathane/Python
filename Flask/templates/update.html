{% extends 'base.html' %}

{% block head %}
    <title>My Flask App</title>
{% endblock %}

{%block body%}
    <div class="content">
        <h1 style="text-align: center;">Update Task</h1>
     
    <div class="form">
        <form action="/update/{{task.id}}" method="post" style="text-align: center;  align-items: center; margin-left: auto; margin-right: auto;">
            <input type="text" name="content" id="content" placeholder="Enter your task" value="{{task.content}}">
            <input type="submit" value="Add Task">
    </div>
</div>
{% endblock %}
